name: Deploy Dev Site

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Replace CNAME for dev domain
        run: |
          echo "dev.fluenciacontabil.com.br" > CNAME
          git config user.email "vfneves94@gmail.com"
          git config user.name "vfneves94"
          git add CNAME
          git commit -m "Set dev CNAME" --allow-empty

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to dev repo via SSH
        run: |
          git remote add dev-target git@github.com:gruponbeducacao/fluencia-contabil-dev.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push dev-target HEAD:main --force
